name: Test

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4
      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Installa il package e le dipendenze di sviluppo
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Verifica import e metadata del package
        run: python -c "import cmmoflp_nuclear_siting; print('Package import OK')"
      - name: Esegue i test senza FutureWarning
        run: python -m pytest -W error::FutureWarning
      - name: Verifica la generazione dei grafici finali
        run: python scripts/generate_final_plots.py --output-dir "${RUNNER_TEMP}/cmmoflp-plots"
