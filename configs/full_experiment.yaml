experiment_name: full
time_limit_seconds: 300
instances_per_class: 10
heuristic_repetitions: 5
base_seed: 1000

sizes:
  - name: small
    communities: 30
    candidate_sites: 10
    plants_to_open: 2
  - name: medium
    communities: 75
    candidate_sites: 25
    plants_to_open: 4
  - name: large
    communities: 150
    candidate_sites: 50
    plants_to_open: 8

distributions: [uniform, clustered]

capacity_levels:
  loose: 1.50
  medium: 1.20
  tight: 1.05

methods: [compact_mip, threshold_exact, greedy, local_search]
